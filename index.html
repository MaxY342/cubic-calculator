<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="src/style.css">
    <title>Cubic Calculator</title>
  </head>
  <body>
    <div class="header">
      <h1>Cubic Calculator</h1>
    </div>
    <div class="content">
      <form id="cubic-form">
        <div class="input-group">
          <label for="a">a-value:</label>
          <input type="number" id="a" name="a" required />
        </div>
        <div class="input-group">
          <label for="b">b-value:</label>
          <input type="number" id="b" name="b" required />
        </div>
        <div class="input-group">
          <label for="c">c-value:</label>
          <input type="number" id="c" name="c" required />
        </div>
        <div class="input-group">
          <label for="d">d-value:</label>
          <input type="number" id="d" name="d" required />
        </div>
        <button type="submit">Solve Cubic</button>
      </form>
    </div>
    <div class="results">
      <h2 id="equation"></h2>
      <div class="graph-container">
        <table id="results-table">
          <tr>
            <th>p</th>
            <th id="p-value"></th>
          </tr>
          <tr>
            <th>q</th>
            <th id="q-value"></th>
          </tr>
          <tr>
            <th>Discriminant</th>
            <th id="discriminant-value"></th>
          </tr>
          <tr id="value-row">
            <th>Value</th>
            <th>x</th>
            <th>y</th>
          </tr>
          <tr> 
            <th>Root 1</th>
            <th id="root1-x"></th>
            <th id="root1-y">0</th>
          </tr>
          <tr>
            <th>Root 2</th>
            <th id="root2-x"></th>
            <th id="root2-y">0</th>
          </tr>
          <tr>
            <th>Root 3</th>
            <th id="root3-x"></th>
            <th id="root3-y">0</th>
          </tr>
        </table>
        <canvas id="graph" width="520" height="520"></canvas>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
